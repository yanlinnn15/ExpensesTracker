services:

  db:
    image: postgres:15-alpine
    container_name: pet2_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "0000"
      POSTGRES_DB: petdb
    volumes:
      - pet2_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pet2_server
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3001
      JWT_SECRET: pet2-dev-secret-change-before-production
      CLIENT_URL: http://localhost:5173
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: "0000"
      DB_DATABASE: petdb
      DB_DIALECT: postgres
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "3001:3001"
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pet2_client
    depends_on:
      - server
    environment:
      VITE_API_BASE_URL: ""
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  pet2_pgdata:
    driver: local
